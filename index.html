<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clue Scorekeeper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1008;
    --surface: #231508;
    --card-bg: #2a1a0a;
    --border: #5a3a1a;
    --gold: #c9902a;
    --gold-light: #e8b84b;
    --gold-dim: #7a5518;
    --cream: #f0e6c8;
    --cream-dim: #9a8060;
    --red: #c0392b;
    --green: #27ae60;
    --scarlet: #8B0000;
    --plum: #4a1a4a;
    --mustard: #6b5010;
    --peacock: #0a3050;
    --white-c: #e8e8e0;
    --orchid: #5a1a5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Crimson Text', Georgia, serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(90,30,10,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(30,10,60,0.3) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9902a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
    position: relative;
  }

  .header-ornament {
    color: var(--gold-dim);
    font-size: 1.1rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-family: 'Crimson Text', serif;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 7vw, 4rem);
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,144,42,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .subtitle {
    color: var(--cream-dim);
    font-style: italic;
    font-size: 1.05rem;
    margin-top: 0.4rem;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin: 1rem auto;
  }

  /* Sync status */
  #sync-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-family: 'Crimson Text', serif;
    color: var(--cream-dim);
    margin-top: 0.5rem;
    padding: 4px 12px;
    border: 1px solid rgba(201,144,42,0.2);
    border-radius: 20px;
    background: rgba(0,0,0,0.3);
    transition: all 0.3s;
  }
  #sync-status.saving { color: var(--gold); border-color: rgba(201,144,42,0.5); }
  #sync-status.saved  { color: var(--green); border-color: rgba(39,174,96,0.4); }
  #sync-status.error  { color: #e74c3c; border-color: rgba(231,76,60,0.4); }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  /* Score grid */
  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    max-width: 640px;
    margin: 1.5rem auto;
    padding: 0 1rem;
  }

  .player-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.2rem 0.8rem 1rem;
    text-align: center;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .player-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.6); }

  .player-card.leader {
    border-color: var(--gold);
    box-shadow: 0 4px 20px rgba(201,144,42,0.2), 0 0 0 1px rgba(201,144,42,0.15);
  }

  .crown {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
    display: none;
  }
  .player-card.leader .crown { display: block; }

  .player-color-bar {
    width: 32px;
    height: 3px;
    border-radius: 2px;
    margin: 0 auto 0.6rem;
  }

  .player-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--cream);
    margin-bottom: 0.2rem;
  }

  .player-subtitle {
    font-size: 0.72rem;
    color: var(--cream-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .score {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 0.3rem;
    transition: transform 0.15s;
  }

  .score.bump { animation: scoreBump 0.25s ease; }
  @keyframes scoreBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  .last-win {
    font-size: 0.7rem;
    color: var(--cream-dim);
    font-style: italic;
    min-height: 1em;
    margin-bottom: 0.8rem;
  }

  .btn-win {
    width: 100%;
    padding: 0.55rem 0;
    font-family: 'Crimson Text', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    border: 1px solid;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 0.4rem;
  }

  .btn-undo {
    width: 100%;
    padding: 0.3rem 0;
    font-family: 'Crimson Text', serif;
    font-size: 0.75rem;
    color: var(--cream-dim);
    background: transparent;
    border: 1px solid rgba(90,58,26,0.5);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-undo:hover:not(:disabled) { color: var(--cream); border-color: var(--border); }
  .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Player colors */
  .card-curt   .player-color-bar { background: #c9902a; }
  .card-curt   .score            { color: #e8b84b; }
  .card-curt   .btn-win          { background: rgba(201,144,42,0.15); border-color: #c9902a; color: #e8b84b; }
  .card-curt   .btn-win:hover    { background: rgba(201,144,42,0.3); }

  .card-heather .player-color-bar { background: #9b2335; }
  .card-heather .score            { color: #d44; }
  .card-heather .btn-win          { background: rgba(155,35,53,0.15); border-color: #9b2335; color: #e05; }
  .card-heather .btn-win:hover    { background: rgba(155,35,53,0.3); }

  .card-mickey .player-color-bar { background: #555; }
  .card-mickey .score            { color: #aaa; }
  .card-mickey .btn-win          { background: rgba(80,80,80,0.2); border-color: #555; color: #bbb; }
  .card-mickey .btn-win:hover    { background: rgba(80,80,80,0.35); }

  /* Total bar */
  .total-bar {
    max-width: 640px;
    margin: 0 auto 1.5rem;
    padding: 0 1rem;
    display: flex;
    justify-content: center;
    gap: 2rem;
    font-size: 0.8rem;
    color: var(--cream-dim);
    font-style: italic;
  }

  /* History */
  .history-section {
    max-width: 640px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .history-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    color: var(--gold-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .btn-clear-all {
    font-family: 'Crimson Text', serif;
    font-size: 0.75rem;
    color: var(--cream-dim);
    background: transparent;
    border: 1px solid rgba(90,58,26,0.4);
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear-all:hover { color: #e74c3c; border-color: rgba(231,76,60,0.4); }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 220px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 3px;
    font-size: 0.82rem;
    border-left: 2px solid var(--border);
  }

  .history-item .hw { font-weight: 600; }
  .hw-curt    { color: #e8b84b; }
  .hw-heather { color: #e05; }
  .hw-mickey  { color: #aaa; }

  .history-time { color: var(--cream-dim); font-style: italic; font-size: 0.72rem; }

  .empty-history {
    text-align: center;
    color: var(--cream-dim);
    font-style: italic;
    font-size: 0.85rem;
    padding: 1.5rem 0;
  }

  /* Mickey disclaimer */
  .mickey-note {
    text-align: center;
    font-size: 0.72rem;
    color: var(--cream-dim);
    font-style: italic;
    padding: 0 1rem 1.5rem;
    opacity: 0.6;
  }

  /* Tie toast */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(30,15,5,0.95);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    padding: 0.7rem 1.5rem;
    border-radius: 4px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    transition: transform 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 400px) {
    .scoreboard { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; padding: 0 0.5rem; }
    .player-card { padding: 1rem 0.5rem 0.8rem; }
    .score { font-size: 2.2rem; }
    .player-name { font-size: 1rem; }
    .btn-win { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-ornament">⚜ The Study ⚜</div>
  <h1>Clue</h1>
  <div class="subtitle">A Record of Accusations &amp; Verdicts</div>
  <div class="divider"></div>
  <div id="sync-status">
    <span class="sync-dot"></span>
    <span id="sync-text">Loading scores…</span>
  </div>
</header>

<div class="scoreboard" id="scoreboard">
  <!-- Cards injected by JS -->
</div>

<div class="total-bar" id="total-bar"></div>

<div class="history-section">
  <div class="history-header">
    <span class="history-title">Case Files</span>
    <button class="btn-clear-all" onclick="confirmReset()">Reset All</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>

<p class="mickey-note">* Mickey wins named after the Lakers' 2020 NBA bubble championship — legitimacy disputed.</p>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6bii9j6bTsTQCK4QT5-zF4XGVRygiYdqExdb0QbFQJqu__l-gLjBr8gRUyGpZzAziow/exec';
const STORAGE_KEY = 'CLUE_SCORES_V2';

const PLAYERS = [
  { id: 'curt',    name: 'Curt',    subtitle: 'The Detective',    cardClass: 'card-curt'    },
  { id: 'heather', name: 'Heather', subtitle: 'The Suspect',      cardClass: 'card-heather' },
  { id: 'mickey',  name: 'Mickey*', subtitle: 'The Computer',     cardClass: 'card-mickey'  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  wins: { curt: 0, heather: 0, mickey: 0 },
  history: []   // { player, ts }
};

// ─── DRIVE SYNC ───────────────────────────────────────────────────────────────
function setSyncStatus(mode, text) {
  const el = document.getElementById('sync-status');
  const tx = document.getElementById('sync-text');
  el.className = mode;
  tx.textContent = text;
}

async function loadFromDrive() {
  setSyncStatus('saving', 'Loading from Drive…');
  try {
    const res = await fetch(SCRIPT_URL + '?action=clueRead');
    const parsed = await res.json();
    if (parsed && parsed.wins) {
      state = parsed;
      setSyncStatus('saved', 'Loaded from Drive');
      return true;
    }
    setSyncStatus('', 'No Drive data — starting fresh');
    return false;
  } catch(e) {
    setSyncStatus('error', 'Drive unavailable — using local');
    return false;
  }
}

async function saveToDrive() {
  setSyncStatus('saving', 'Saving to Drive…');
  const encoded = encodeURIComponent(JSON.stringify(state));
  try {
    await fetch(SCRIPT_URL + '?action=clueWrite&data=' + encoded);
    setSyncStatus('saved', 'Saved · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('saved', 'Saved locally · ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.wins) { state = parsed; return true; }
    }
  } catch(e) {}
  return false;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getLeaders() {
  const max = Math.max(...Object.values(state.wins));
  if (max === 0) return [];
  return Object.keys(state.wins).filter(p => state.wins[p] === max);
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' +
         d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function lastWinFor(playerId) {
  const entries = [...(state.history || [])].reverse().filter(h => h.player === playerId);
  return entries.length ? entries[0].ts : null;
}

function render() {
  const leaders = getLeaders();
  const board = document.getElementById('scoreboard');
  board.innerHTML = PLAYERS.map(p => {
    const wins = state.wins[p.id] || 0;
    const isLeader = leaders.includes(p.id);
    const lw = lastWinFor(p.id);
    return `
      <div class="player-card ${p.cardClass}${isLeader ? ' leader' : ''}">
        <div class="crown">♛</div>
        <div class="player-color-bar"></div>
        <div class="player-name">${p.name}</div>
        <div class="player-subtitle">${p.subtitle}</div>
        <div class="score" id="score-${p.id}">${wins}</div>
        <div class="last-win">${lw ? 'Last: ' + fmtTime(lw) : '—'}</div>
        <button class="btn-win" onclick="recordWin('${p.id}')">+ Victory</button>
        <button class="btn-undo" id="undo-${p.id}" onclick="undoWin('${p.id}')" ${wins === 0 ? 'disabled' : ''}>↩ undo</button>
      </div>`;
  }).join('');

  // History
  const hl = document.getElementById('history-list');
  const hist = [...(state.history || [])].reverse();
  if (!hist.length) {
    hl.innerHTML = '<div class="empty-history">No games recorded yet.</div>';
  } else {
    hl.innerHTML = hist.map((h, i) => {
      const p = PLAYERS.find(x => x.id === h.player);
      const label = p ? p.name : h.player;
      const cls = 'hw-' + h.player;
      return `<div class="history-item">
        <span><span class="hw ${cls}">${label}</span> solved the case</span>
        <span class="history-time">${fmtTime(h.ts)}</span>
      </div>`;
    }).join('');
  }

  // Total bar
  const total = Object.values(state.wins).reduce((a,b) => a+b, 0);
  document.getElementById('total-bar').textContent =
    total === 0 ? '' : total + ' game' + (total !== 1 ? 's' : '') + ' played';
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function recordWin(playerId) {
  if (!state.wins) state.wins = {};
  if (!state.history) state.history = [];
  state.wins[playerId] = (state.wins[playerId] || 0) + 1;
  state.history.push({ player: playerId, ts: new Date().toISOString() });
  render();
  // Bump animation
  const el = document.getElementById('score-' + playerId);
  if (el) { el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
  // Leader check
  const leaders = getLeaders();
  if (leaders.length > 1) showToast('A tie! The case remains open…');
  saveToDrive();
}

function undoWin(playerId) {
  if (!state.wins[playerId] || state.wins[playerId] <= 0) return;
  state.wins[playerId]--;
  // Remove last history entry for this player
  const idx = [...state.history].map((h,i)=>({...h,i})).reverse().find(h => h.player === playerId);
  if (idx !== undefined) state.history.splice(idx.i, 1);
  render();
  saveToDrive();
}

function confirmReset() {
  if (confirm('Reset ALL scores and history? This cannot be undone.')) {
    state = { wins: { curt: 0, heather: 0, mickey: 0 }, history: [] };
    render();
    saveToDrive();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // Load local first for instant render
  loadFromLocal();
  render();
  // Then load from Drive (overwrites local if found)
  await loadFromDrive();
  render();
}

init();
</script>
</body>
</html>
